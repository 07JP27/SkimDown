name: SkimDown

options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"

targets:
  SkimDown:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: SkimDown
        excludes:
          - Resources/**
    resources:
      - path: SkimDown/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jp27.SkimDown
        INFOPLIST_FILE: SkimDown/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SkimDown/Resources/SkimDown.entitlements
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_HARDENED_RUNTIME: "YES"
    postBuildScripts:
      - name: Copy bundled resources
        script: |
          set -euo pipefail
          RESOURCES_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${RESOURCES_DIR}"
          rsync -a --delete "${SRCROOT}/SkimDown/Resources/Web" "${RESOURCES_DIR}/"
          cp "${SRCROOT}/SkimDown/Resources/SkimDown.icns" "${RESOURCES_DIR}/SkimDown.icns"

  SkimDownTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: SkimDownTests
    dependencies:
      - target: SkimDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.jp27.SkimDownTests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SkimDown.app/Contents/MacOS/SkimDown"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  SkimDown:
    build:
      targets:
        SkimDown: all
        SkimDownTests: [test]
    test:
      targets:
        - SkimDownTests
