name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'design/**'
      - 'samples/**'
      - '**/*.md'
      - 'icon.png'
      - 'LICENSE'
      - '.gitignore'
      - '.env.example'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -p
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: src
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project src/SkimDown.xcodeproj \
            -scheme SkimDown \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        run: |
          xcodebuild test \
            -project src/SkimDown.xcodeproj \
            -scheme SkimDown \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
