name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from tag (e.g. v1.0.0 -> 1.0.0)
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Select Xcode
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -p
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: src
        run: xcodegen generate

      - name: Build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ github.run_number }}"
          xcodebuild -project src/SkimDown.xcodeproj \
            -scheme SkimDown \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Ad-hoc codesign
        run: |
          APP_PATH="build/Build/Products/Release/SkimDown.app"
          # Re-sign with ad-hoc identity to seal all bundle resources
          # (linker-signed binaries lack resource sealing, causing "damaged" errors)
          codesign --force --deep -s - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          echo "Ad-hoc signing verified"

      - name: Create DMG
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="build/Build/Products/Release/SkimDown.app"
          DMG_NAME="SkimDown-v${VERSION}.dmg"

          # Verify .app exists
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: SkimDown.app not found at $APP_PATH"
            find build -name "SkimDown.app" -type d
            exit 1
          fi

          # Create staging directory with .app and Applications symlink
          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          # Create compressed DMG
          hdiutil create \
            -volname "SkimDown" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            "$DMG_NAME"

          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "Created: $DMG_NAME"
          ls -lh "$DMG_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: SkimDown ${{ steps.version.outputs.tag_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.dmg.outputs.dmg_name }}
          body: |
            ## Installation

            1. Download **${{ steps.dmg.outputs.dmg_name }}** below
            2. Open the `.dmg` file and drag **SkimDown.app** to the **Applications** folder
            3. If you see the warning "Apple could not verify "SkimDown" is free of malware that may harm your Mac or compromise your privacy", run the following command in **Terminal** to remove the quarantine attribute. Please review the source code in this repository and run at your own risk.
               ```
               xattr -dr com.apple.quarantine /Applications/SkimDown.app
               ```
            4. Open SkimDown from Applications
